# Supabase Local Config — Clinicboard
# https://supabase.com/docs/guides/local-development

[api]
# Port for the local Supabase API / PostgREST
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# Port for the local Supabase Postgres instance
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
# Supabase Studio UI
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
# Local email testing (Inbucket)
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Configures the base URL for your application
site_url = "http://127.0.0.1:3000"
# Redirect URLs allowed after login (dev + production)
additional_redirect_urls = [
  "http://localhost:3000",
  "https://clinicboard.vercel.app",
  "https://clinicboard-*.vercel.app"
]
# JWT secret — set in production via Supabase dashboard
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
policy = "oneshot"

# ─────────────────────────────────────────
# To link this project to Supabase cloud:
#   npx supabase link --project-ref <your-project-ref>
# To apply migrations to production:
#   npx supabase db push
# ─────────────────────────────────────────
